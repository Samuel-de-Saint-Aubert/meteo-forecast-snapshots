name: Fetch AROME forecast

on:
  schedule:
    - cron: '20 * * * *'   # toutes les heures, à :20
  workflow_dispatch:

concurrency:
  group: fetch-meteo
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python fetch_forecast.py

      - name: Commit et push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "forecast $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
